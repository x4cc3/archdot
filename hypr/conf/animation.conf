animations {
    enabled = yes

    # Snappier motion
    bezier = snap, 0.12, 0.92, 0.18, 1.00

    animation = windows, 1, 1, snap, slide
    animation = windowsOut, 1, 1, snap, slide
    animation = windowsMove, 1, 2, snap
    animation = border, 1, 3, snap
    animation = fade, 1, 1, snap
    animation = workspaces, 1, 2, snap, slide
}
